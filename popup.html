<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>肘子</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .container { padding: 16px; }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #e94560;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span { font-size: 20px; }
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.2s;
    }
    .btn:hover { background: #ff6b81; }
    .btn:disabled {
      background: #555;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #999;
      text-align: center;
      min-height: 18px;
    }
    #status.success { color: #2ecc71; }
    #status.error { color: #e74c3c; }
    #tips {
      margin-top: 8px;
      padding: 8px 10px;
      background: #0f3460;
      border-radius: 6px;
      font-size: 11px;
      color: #ccc;
      line-height: 1.5;
      display: none;
      border-left: 3px solid #e94560;
    }
    #tips strong { color: #e94560; }
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: #666;
    }
    .footer a {
      color: #e94560;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>📖</span> 肘子</h1>
    <button class="btn" id="saveBtn">💾 保存当前页面</button>
    <div id="status">就绪</div>
    <div id="tips"></div>
    <div class="footer">
      <a href="#" id="openOptions">设置</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
