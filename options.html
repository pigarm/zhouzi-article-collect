<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>肘子 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      max-width: 640px;
      width: 100%;
      background: #16213e;
      border-radius: 12px;
      padding: 28px;
    }
    h1 {
      font-size: 20px;
      color: #e94560;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span { font-size: 24px; }
    .tabs {
      display: flex;
      gap: 4px;
      margin: 16px 0;
      border-bottom: 1px solid #333;
    }
    .tab {
      padding: 8px 16px;
      cursor: pointer;
      border: none;
      background: none;
      color: #999;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: #e0e0e0; }
    .tab.active {
      color: #e94560;
      border-bottom-color: #e94560;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 设置页 */
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: #ccc;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 14px;
      background: #0f3460;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #e94560; }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.2s;
    }
    .btn:hover { background: #ff6b81; }
    .btn.secondary {
      background: #0f3460;
      color: #e0e0e0;
    }
    .btn.secondary:hover { background: #1a4a80; }
    #msg {
      margin-top: 12px;
      font-size: 13px;
    }
    #msg.success { color: #2ecc71; }
    #msg.error { color: #e74c3c; }
    .example {
      background: #0f3460;
      border-radius: 6px;
      padding: 10px 14px;
      margin-top: 16px;
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }
    .example code {
      color: #e94560;
      background: rgba(233, 69, 96, 0.1);
      padding: 1px 4px;
      border-radius: 3px;
    }

    /* 日志页 */
    .log-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .log-count { color: #999; font-size: 12px; }
    .log-filters { margin-bottom: 12px; }
    .log-filters button {
      padding: 4px 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f3460;
      color: #999;
      cursor: pointer;
      font-size: 12px;
      margin-right: 4px;
    }
    .log-filters button.active {
      background: #e94560;
      color: #fff;
      border-color: #e94560;
    }
    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .log-table th {
      text-align: left;
      padding: 6px 4px;
      color: #888;
      border-bottom: 1px solid #333;
      font-weight: 500;
    }
    .log-table td {
      padding: 6px 4px;
      border-bottom: 1px solid #222;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .log-table .ok { color: #2ecc71; font-weight: 500; }
    .log-table .fail { color: #e74c3c; font-weight: 500; }
    .log-table .url-cell { max-width: 120px; }
    .log-table .title-cell { max-width: 100px; }
    .log-empty {
      text-align: center;
      color: #666;
      padding: 40px 0;
      font-size: 13px;
    }
    .clear-btn {
      font-size: 11px;
      color: #e74c3c;
      cursor: pointer;
      background: none;
      border: 1px solid #e74c3c;
      border-radius: 4px;
      padding: 2px 8px;
    }
    .clear-btn:hover { background: rgba(231,76,60,0.1); }
  </style>
</head>
<body>
  <div class="card">
    <h1><span>⚙️</span> 肘子 设置</h1>

    <div class="tabs">
      <button class="tab active" data-tab="settings">📋 偏好设置</button>
      <button class="tab" data-tab="log">📝 保存日志</button>
    </div>

    <!-- 设置页 -->
    <div class="tab-content active" id="tab-settings">
      <div class="field">
        <label for="savePath">保存路径（绝对路径）</label>
        <input type="text" id="savePath" placeholder="/home/bao/下载/文章">
        <div class="hint">留空则使用默认路径 /home/bao/下载/</div>
      </div>

      <button class="btn" id="savePathBtn">💾 保存设置</button>
      <div id="msg"></div>

      <div class="example">
        <strong>示例：</strong><br>
        填写 <code>/home/bao/下载/文章</code> → 保存到 <code>下载/文章/标题.md</code><br>
        填写 <code>/home/bao/桌面/慢读</code> → ⚠️ 超出下载目录，会兜底存到下载目录根<br>
        留空 → 直接保存到 <code>下载/标题.md</code>
      </div>
    </div>

    <!-- 日志页 -->
    <div class="tab-content" id="tab-log">
      <div class="log-bar">
        <span class="log-count" id="logCount">共 0 条记录</span>
        <div>
          <button class="btn secondary" id="exportLogBtn" style="font-size:12px;padding:6px 12px;margin-right:4px">📥 导出日志</button>
          <button class="clear-btn" id="clearLogBtn">清空</button>
        </div>
      </div>

      <div class="log-filters">
        <button class="active" data-filter="all">全部</button>
        <button data-filter="成功">成功</button>
        <button data-filter="失败">失败</button>
      </div>

      <div id="logContainer">
        <div class="log-empty">暂无保存记录</div>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
